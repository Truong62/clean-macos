name: CleanMacOS
options:
  bundleIdPrefix: com.sarus
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
targets:
  CleanMacOS:
    type: application
    platform: macOS
    sources:
      - Sources
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.sarus.CleanMacOS
      MARKETING_VERSION: "1.0.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_VERSION: "5.9"
      GENERATE_INFOPLIST_FILE: YES
      INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.utilities"
